<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — The Mystical Wild</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.png" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#0a0f0c;
    --moss:#7a8b6f;
    --mist:#e8e4d8;
    --mist-dim:rgba(232,228,216,.7);
    --serif:'Cormorant Garamond','Didot',Georgia,serif;
    --sans:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--forest);color:var(--mist);font-family:var(--sans);font-weight:300;
    min-height:100vh;min-height:100svh;min-height:100dvh;
    position:relative;overflow:hidden;
  }
  ::selection{background:var(--moss);color:var(--forest)}

  .bg{
    position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:56% 38%;
    filter:saturate(.92) contrast(1.03);
  }
  .scrim{
    position:fixed;inset:0;
    background:linear-gradient(to top,rgba(10,15,12,.82) 0%,rgba(10,15,12,.35) 40%,rgba(10,15,12,.1) 65%);
  }

  main{
    position:relative;z-index:1;
    min-height:100vh;min-height:100svh;min-height:100dvh;
    display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-start;
    padding:0 32px 64px;max-width:760px;
  }
  .code{
    font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--mist-dim);margin-top:18px;
  }
  h1{
    font-family:var(--serif);font-weight:400;font-style:italic;
    font-size:clamp(2.1rem,6vw,3.6rem);line-height:1.2;letter-spacing:.01em;
    text-wrap:balance;
  }
  a.cta{
    display:inline-block;margin-top:34px;
    color:var(--moss);text-decoration:none;
    font-family:var(--sans);font-size:10.5px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;
    border:1px solid var(--moss);padding:14px 30px;transition:background .35s ease,color .35s ease;
  }
  a.cta:hover,a.cta:focus-visible{background:var(--moss);color:var(--forest)}
  a:focus-visible{outline:1px solid var(--moss);outline-offset:4px}

  @media (prefers-reduced-motion:no-preference){
    main{animation:fadeUp 1s ease .15s both}
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<img class="bg" src="images/lost-trail.webp" alt="A tiger mid-stride at dusk near a waterhole, tongue out mid-lick, looking unimpressed." width="1066" height="1600">
<div class="scrim"></div>

<main>
  <h1>Nothing. Not Even a Pugmark.</h1>
  <div class="code">404 &middot; NOT FOUND</div>
  <a class="cta" href="/">Return</a>
</main>

</body>
</html>
